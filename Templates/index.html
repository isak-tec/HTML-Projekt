<!DOCTYPE html>
<html lang="en">

<head>

    <title>website example</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styleFile.css') }}">
    
</head>

<body class="page">

   

    <div class="header-container">

        <h1 class="light-blue" action="">Website example</h1>

        <form action="/postButton" method="post">
            <button class="btn menu-buttons">
                <h1 class="light-blue" >New Post</h1>
            </button>
        </form>
        <form action="/login_button" method="post">
            <button class="btn menu-buttons">
                <h1 class="light-blue" >Login</h1>
            </button>
        </form>

        <form action="/posts" method="get">
            <button class="btn menu-buttons">
                <h1 class="light-blue">Posts</h1>
            </button>
        </form>

       

    </div>


    {%if current_page == "login"%}
    <div class="container">

        <h1 class="light-blue">Website example</h1>
        <div class="login-area">

            <form action="/loginattempt" method="post">

                <p class="light-blue">username</p>
            <input class="input-field" type="input" name="username">

                <p class="light-blue">password</p>
            <input class="input-field" type="input" name="password">

                <button type=submit class="btn login-btn">submit</button>
            </form>
        </div>     
    </div>
    {%endif%}


    {% if current_page == "post_side" %}
    <div class="post-field">
        <form action="/save" method="post">
            <input class="input-field" name="post_title">
            <button type=submit>save</button>
            <textarea class="text-area" color="#ffff" name="post_text"></textarea>
        </form>
    </div>
    {%endif%}

    </body>

</html>
